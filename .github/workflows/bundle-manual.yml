name: Android Bundle Build

on:
  workflow_dispatch:

concurrency:
  group: bundle-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing and Firebase files
        shell: bash
        run: |
          if [ -z "${{ secrets.KEY_BASE64 }}" ]; then
            echo "Missing required secret: KEY_BASE64"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_STORE_PASSWORD }}" ]; then
            echo "Missing required secret: SIGNING_STORE_PASSWORD"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_KEY_ALIAS }}" ]; then
            echo "Missing required secret: SIGNING_KEY_ALIAS"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}" ]; then
            echo "Missing required secret: SIGNING_KEY_PASSWORD"
            exit 1
          fi

          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key

          cat > local.properties <<'EOF'
          storeFile=app/app.key
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            cat > app/google-services.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF
          fi

      - name: Build release bundle
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-bundle-${{ github.run_number }}
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/**
          if-no-files-found: error
