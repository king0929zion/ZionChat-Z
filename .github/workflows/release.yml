name: Android Signed Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: signed-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Read version metadata
        id: version
        shell: bash
        run: |
          version_name=$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n1)
          version_code=$(sed -n 's/.*versionCode = \([0-9]*\).*/\1/p' app/build.gradle.kts | head -n1)

          if [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "Failed to read version metadata from app/build.gradle.kts"
            exit 1
          fi

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Prepare signing and Firebase files
        shell: bash
        run: |
          if [ -z "${{ secrets.KEY_BASE64 }}" ]; then
            echo "Missing required secret: KEY_BASE64"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_STORE_PASSWORD }}" ]; then
            echo "Missing required secret: SIGNING_STORE_PASSWORD"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_KEY_ALIAS }}" ]; then
            echo "Missing required secret: SIGNING_KEY_ALIAS"
            exit 1
          fi

          if [ -z "${{ secrets.SIGNING_KEY_PASSWORD }}" ]; then
            echo "Missing required secret: SIGNING_KEY_PASSWORD"
            exit 1
          fi

          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key

          cat > local.properties <<'EOF'
          storeFile=app/app.key
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            cat > app/google-services.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF
          else
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "zionchat-z-placeholder",
              "storage_bucket": "zionchat-z-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890abcdef123456",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyD-placeholder-ZionChatZ"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build signed release APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-apk-${{ steps.version.outputs.version_name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
          if-no-files-found: error

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: v${{ steps.version.outputs.version_name }}
          body_path: release-notes.md
          files: |
            app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: false
